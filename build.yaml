include:
  # Prospector Dongle (Central)
  - board: seeeduino_xiao_ble
    shield: cornix_dongle
    artifact-name: cornix_dongle

  # Cornix Left (Peripheral)
  - board: cornix_left
    shield: cornix_indicator
    artifact-name: cornix_left_peripheral

  # Cornix Right (Peripheral)
  - board: cornix_right
    shield: cornix_indicator
    artifact-name: cornix_right_peripheral

  # Settings reset for Dongle
  - board: seeeduino_xiao_ble
    shield: settings_reset
    artifact-name: reset_dongle

  # Settings reset (for troubleshooting)
  # WARNING: Use the correct reset firmware for each device!
  # - reset_cornix: Cornix keyboards only (nRF52840 E73 module)
  # Flashing the wrong reset firmware can corrupt the bootloader!
  - board: cornix_left
    shield: settings_reset
    artifact-name: reset_cornix
    # 追加: リセット時は既存の .conf を無視させる
    cmake-args: -DCONFIG_FILE_NAME=settings_reset

