# Keyboard name
CONFIG_ZMK_KEYBOARD_NAME="Cornix"

# Bluetooth configuration
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CENTRAL=n

# Split keyboard configuration
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

# Battery level reporting
CONFIG_ZMK_BATTERY_REPORTING=y

# Input / Mouse support
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y

# Power management
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Common
## Increase BLE TX power for better connectivity (from original Cornix)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# BLE tuning (stabilize as peripheral)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=9
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=9
